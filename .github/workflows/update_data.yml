name: Auto Fetch 0056 Data

on:
  schedule:
    # 每天台灣時間下午 6 點 (UTC 10:00) 執行一次，週一至週五
    - cron: '0 10 * * 1-5'
  workflow_dispatch: # 允許在 GitHub 網頁上手動點擊執行

# 加入這三行，賦予 Actions 寫入 Repo 的權限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Python script
        run: python fetch_0056.py

      - name: Commit and Push changes
        run: |
          # 先檢查檔案是否存在
          if [ -f "data/0056.json" ]; then
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add data/0056.json
            git commit -m "Auto-update 0056 constituents" || exit 0
            git push
            echo "上傳 GitHub 成功！"
          else
            echo "錯誤：找不到 data/0056.json 檔案，略過 Commit 步驟。"
            exit 1
          fi